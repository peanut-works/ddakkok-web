openapi: 3.1.0
info:
  title: ddakkok-be
  description: 영유아 맞춤 제품 안전관리 서비스 딱콕 API
  version: 0.1.0
paths:
  /api/health:
    get:
      tags:
      - health
      summary: API health check
      operationId: health_check_api_health_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/health/db:
    get:
      tags:
      - health
      summary: Database connection health check
      operationId: database_health_check_api_health_db_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatabaseHealthResponse'
        '500':
          description: Database connection failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/ai/ping:
    get:
      tags:
      - ai
      summary: AI provider connection check
      description: 'AI provider 연결 테스트.


        - AI_PROVIDER=openai/gms: 실제 API 호출 (15초 timeout)

        - AI_PROVIDER=mock       : mock 응답 즉시 반환

        - 호출 실패 시            : FallbackAIProvider가 mock으로 자동 전환

        - 어떤 경우에도 200 + 정상 JSON 형식으로 응답 (시연 중단 없음)'
      operationId: ai_ping_api_ai_ping_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiPingResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/ai/analyze:
    post:
      tags:
      - ai
      summary: Analyze Product
      description: "제품 라벨 이미지를 분석해 반 전체 아동의 안전카드를 반환한다.\n\n파이프라인:\n    이미지 → 전처리 →\
        \ OCR → NER → Rule Checker → LLM 설명 → DB 저장\n\n- classroom_id 반의 활성 아동 전원을\
        \ 대조 대상으로 삼는다.\n- 어떤 단계가 실패해도 fallback으로 자동 전환되어 200 응답을 유지한다.\n- 결과는 SafetyCheck\
        \ + SafetyCheckResult 테이블에 저장된다."
      operationId: analyze_product_api_ai_analyze_post
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Body_analyze_product_api_ai_analyze_post'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SafetyCardResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/ai/analyze/demo:
    get:
      tags:
      - ai
      summary: Analyze Demo
      description: '이미지 없이 시나리오 OCR 텍스트로 전체 파이프라인을 실행한다. DB 저장 없음.


        현장 시연 시 이미지 촬영 없이 안전카드 흐름을 빠르게 보여줄 때 사용.

        classroom_id 반의 실제 아동 데이터를 그대로 사용하므로 시연 현실감이 높다.'
      operationId: analyze_demo_api_ai_analyze_demo_get
      parameters:
      - name: scenario
        in: query
        required: false
        schema:
          type: string
          description: '시나리오: wipes (FAIL) / lotion (WARN) / sunscreen (PASS)'
          default: wipes
          title: Scenario
        description: '시나리오: wipes (FAIL) / lotion (WARN) / sunscreen (PASS)'
      - name: classroom_id
        in: query
        required: false
        schema:
          type: integer
          description: 분석 대상 반 ID (DB에 존재해야 함)
          default: 1
          title: Classroom Id
        description: 분석 대상 반 ID (DB에 존재해야 함)
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SafetyCardResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/auth/login:
    post:
      tags:
      - auth
      summary: Login
      operationId: login_api_auth_login_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/auth/demo:
    post:
      tags:
      - auth
      summary: Demo Login
      operationId: demo_login_api_auth_demo_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
  /api/auth/me:
    get:
      tags:
      - auth
      summary: Get Me
      operationId: get_me_api_auth_me_get
      parameters:
      - name: Authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserContext'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/auth/kakao:
    post:
      tags:
      - auth
      summary: Kakao Login
      operationId: kakao_login_api_auth_kakao_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KakaoLoginRequest'
        required: true
      responses:
        '501':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/classrooms:
    get:
      tags:
      - classrooms
      summary: List Classrooms
      operationId: list_classrooms_api_classrooms_get
      parameters:
      - name: Authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ClassroomResponse'
                title: Response List Classrooms Api Classrooms Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/products:
    get:
      tags:
      - products
      summary: 제품 목록 조회
      description: 로그인 사용자의 시설 기준 제품 목록을 조회합니다. barcode query parameter를 보내면 해당 바코드
        제품만 필터링합니다.
      operationId: list_products_api_products_get
      parameters:
      - name: barcode
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: 제품 조회용 바코드 필터
          examples:
          - '880100000101'
          title: Barcode
        description: 제품 조회용 바코드 필터
      - name: Authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      responses:
        '200':
          description: 시설 제품 목록입니다. barcode 쿼리를 함께 보내면 해당 바코드로 필터링합니다.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProductResponse'
                title: Response List Products Api Products Get
              example:
              - id: 101
                facility_id: 1
                name: 세이프 데일리 핸드워시
                category: CLEANSER
                manufacturer: 해커톤생활건강
                barcode: '880100000101'
                expiry_date: '2027-12-31'
                raw_ingredients_text: 정제수, 글리세린, 코코베타인, 구연산
                ingredients:
                - 정제수
                - 글리세린
                - 코코베타인
                - 구연산
                normalized_ingredients:
                - 정제수
                - 글리세린
                - 코코베타인
                - 구연산
                created_by_id: 1
        '400':
          description: barcode 쿼리에서 공백을 제거한 뒤 빈 값이 된 경우
          content:
            application/json:
              example:
                error:
                  code: BAD_REQUEST
                  message: Barcode must not be empty
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    post:
      tags:
      - products
      summary: 제품 등록
      operationId: create_product_api_products_post
      parameters:
      - name: Authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductCreateRequest'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/products/{product_id}:
    get:
      tags:
      - products
      summary: 제품 상세 조회
      operationId: get_product_api_products__product_id__get
      parameters:
      - name: product_id
        in: path
        required: true
        schema:
          type: integer
          title: Product Id
      - name: Authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/products/parse-label-text:
    post:
      tags:
      - products
      summary: 제품 라벨 텍스트 파싱
      operationId: parse_product_label_text_api_products_parse_label_text_post
      parameters:
      - name: Authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductLabelTextParseRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductLabelTextParseResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/classrooms/{classroom_id}/children:
    get:
      tags:
      - children
      summary: 반별 아동 목록 조회
      operationId: list_children_by_classroom_api_classrooms__classroom_id__children_get
      parameters:
      - name: classroom_id
        in: path
        required: true
        schema:
          type: integer
          title: Classroom Id
      - name: Authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ChildListItemResponse'
                title: Response List Children By Classroom Api Classrooms  Classroom
                  Id  Children Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/children/{child_id}:
    get:
      tags:
      - children
      summary: 아동 상세 정보 조회
      operationId: get_child_detail_api_children__child_id__get
      parameters:
      - name: child_id
        in: path
        required: true
        schema:
          type: integer
          title: Child Id
      - name: Authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChildDetailResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/safety-checks:
    post:
      tags:
      - safety-checks
      summary: 제품 안전 검사 실행
      operationId: create_safety_check_api_safety_checks_post
      parameters:
      - name: Authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SafetyCheckCreateRequest'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SafetyCheckResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    get:
      tags:
      - safety-checks
      summary: 안전 검사 기록 목록 조회
      description: 로그인 사용자의 시설 기준 안전 검사 기록을 최신순으로 조회합니다. classroom_id만 보내도 해당 반 기록을
        기본 10개 조회하며, limit은 최대 30개까지 허용합니다.
      operationId: get_safety_checks_api_safety_checks_get
      parameters:
      - name: classroom_id
        in: query
        required: false
        schema:
          anyOf:
          - type: integer
          - type: 'null'
          title: Classroom Id
      - name: status
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            pattern: ^(PASS|WARN|FAIL|EXPIRED|UNKNOWN)$
          - type: 'null'
          title: Status
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 30
          minimum: 1
          default: 10
          title: Limit
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          default: 0
          title: Offset
      - name: Authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      responses:
        '200':
          description: 검사 기록 목록입니다.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SafetyCheckListItemResponse'
                title: Response Get Safety Checks Api Safety Checks Get
              example:
              - id: 94
                product:
                  id: 135
                  name: 판토모틴
                  category: ETC
                classroom_id: 1
                overall_status: PASS
                pass_count: 2
                warn_count: 0
                fail_count: 0
                expired_count: 0
                unknown_count: 0
                total_count: 2
                children:
                - child_id: 1
                  child_name: 강민준
                  status: PASS
                  status_label: 사용 가능
                - child_id: 2
                  child_name: 김서아
                  status: PASS
                  status_label: 사용 가능
                created_at: '2026-06-11T17:30:00'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/safety-checks/{check_id}:
    get:
      tags:
      - safety-checks
      summary: 저장된 안전 검사 결과 조회
      operationId: get_safety_check_api_safety_checks__check_id__get
      parameters:
      - name: check_id
        in: path
        required: true
        schema:
          type: integer
          title: Check Id
      - name: Authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SafetyCheckDetailResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/safety-checks/{check_id}/explanations:
    post:
      tags:
      - safety-checks
      summary: 저장된 안전 검사 결과 설명 생성
      operationId: create_safety_check_explanations_api_safety_checks__check_id__explanations_post
      parameters:
      - name: check_id
        in: path
        required: true
        schema:
          type: integer
          title: Check Id
      - name: Authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SafetyCheckDetailResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/dashboard/summary:
    get:
      tags:
      - dashboard
      summary: 홈 대시보드 요약 조회
      operationId: dashboard_summary_api_dashboard_summary_get
      parameters:
      - name: classroom_id
        in: query
        required: false
        schema:
          anyOf:
          - type: integer
          - type: 'null'
          title: Classroom Id
      - name: Authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardSummaryResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /:
    get:
      summary: API root
      operationId: root__get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RootResponse'
components:
  schemas:
    AiPingResponse:
      properties:
        status:
          type: string
          title: Status
        provider:
          type: string
          title: Provider
        response:
          type: string
          title: Response
      type: object
      required:
      - status
      - provider
      - response
      title: AiPingResponse
      examples:
      - provider: mock
        response: 연결 성공
        status: ok
      - provider: openai
        response: AI 연결에 실패했습니다. Mock 응답으로 대체됩니다.
        status: fallback
    AttentionChildResponse:
      properties:
        child_id:
          type: integer
          title: Child Id
        child_name:
          type: string
          title: Child Name
        status:
          type: string
          title: Status
        status_label:
          type: string
          title: Status Label
      type: object
      required:
      - child_id
      - child_name
      - status
      - status_label
      title: AttentionChildResponse
    AttentionProductResponse:
      properties:
        check_id:
          type: integer
          title: Check Id
        product_id:
          type: integer
          title: Product Id
        product_name:
          type: string
          title: Product Name
        overall_status:
          type: string
          title: Overall Status
        status_label:
          type: string
          title: Status Label
        summary:
          type: string
          title: Summary
        children:
          items:
            $ref: '#/components/schemas/AttentionChildResponse'
          type: array
          title: Children
      type: object
      required:
      - check_id
      - product_id
      - product_name
      - overall_status
      - status_label
      - summary
      - children
      title: AttentionProductResponse
    AuthResponse:
      properties:
        access_token:
          type: string
          title: Access Token
          examples:
          - mock-token:user:1
        token_type:
          type: string
          title: Token Type
          default: bearer
          examples:
          - bearer
        login_method:
          type: string
          enum:
          - FACILITY
          - EMAIL
          - DEMO
          title: Login Method
          examples:
          - FACILITY
        user:
          $ref: '#/components/schemas/UserContext'
      type: object
      required:
      - access_token
      - login_method
      - user
      title: AuthResponse
      example:
        access_token: mock-token:user:1
        login_method: FACILITY
        token_type: bearer
        user:
          classroom:
            age_group: 만 3세
            id: 1
            name: 햇님반
          email: teacher@ddakkok.com
          facility:
            facility_type: DAYCARE
            id: 1
            name: 땅콩어린이집
          id: 1
          name: 김하늘
          role: TEACHER
    Body_analyze_product_api_ai_analyze_post:
      properties:
        image:
          type: string
          contentMediaType: application/octet-stream
          title: Image
          description: 제품 라벨 이미지 (JPEG/PNG)
        classroom_id:
          type: integer
          title: Classroom Id
          description: 분석 대상 반 ID
      type: object
      required:
      - image
      - classroom_id
      title: Body_analyze_product_api_ai_analyze_post
    ChildDetailResponse:
      properties:
        id:
          type: integer
